<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Prime Heritage Trust</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0A2540, #1F4A6E); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 24px; padding: 40px; width: 450px; text-align: center; }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    button { background: #F5A623; color: #0A2540; padding: 12px; border: none; border-radius: 40px; width: 100%; font-weight: bold; cursor: pointer; }
    .link { margin-top: 20px; display: block; color: #F5A623; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="tel" id="phone" placeholder="Phone Number">
    <select id="currency">
      <option value="USD">🇺🇸 USD - US Dollar ($)</option>
      <option value="EUR">🇪🇺 EUR - Euro (€)</option>
      <option value="GBP">🇬🇧 GBP - British Pound (£)</option>
      <option value="NGN">🇳🇬 NGN - Nigerian Naira (₦)</option>
    </select>
    <input type="password" id="pin" placeholder="Create PIN (4-6 digits)" maxlength="6">
    <button onclick="signup()">Create Account</button>
    <a href="login.html" class="link">Already have an account? Sign In</a>
    <a href="index.html" class="link">← Back</a>
  </div>
  <script>
    function signup() {
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
