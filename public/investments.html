<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Investments | Prime Heritage Trust</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F7FB; color: #1A2C3E; }
    .app-container { max-width: 500px; margin: 0 auto; background: #FFFFFF; min-height: 100vh; padding-bottom: 80px; }
    .page-header { background: #0A2540; padding: 30px 20px; color: white; border-radius: 0 0 32px 32px; }
    .page-header a { color: white; font-size: 24px; text-decoration: none; }
    .portfolio-card { background: linear-gradient(135deg, #1F4A6E, #0A2540); margin: 20px; padding: 24px; border-radius: 28px; color: white; }
    .portfolio-value { font-size: 36px; font-weight: 800; margin: 8px 0; }
    .investment-types { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; }
    .inv-card { background: #F8FAFE; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; border: 1px solid #E2E8F0; transition: 0.2s; }
    .inv-card:hover { transform: translateY(-3px); background: #F5A623; color: white; }
    .inv-card i { font-size: 32px; color: #F5A623; margin-bottom: 8px; display: block; }
    .inv-form { padding: 20px; display: none; }
    .inv-form.active { display: block; }
    .my-investments { padding: 20px; }
    .investment-item { background: #F8FAFE; border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .btn-primary { background: #F5A623; color: #0A2540; padding: 14px; border: none; border-radius: 40px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 16px; }
    .form-input { width: 100%; padding: 14px; border: 1px solid #E2E8F0; border-radius: 16px; margin-bottom: 12px; font-family: inherit; }
    .bottom-nav { position: fixed; bottom: 0; max-width: 500px; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 20px 24px; border-top: 1px solid #E9EDF2; }
    .nav-item { text-align: center; color: #9AA9B9; text-decoration: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #F5A623; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
    .modal.active { opacity: 1; visibility: visible; }
    .modal-content { background: white; border-radius: 32px; padding: 32px; width: 90%; max-width: 380px; text-align: center; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
      <h2>Investments</h2>
      <p>Grow your wealth</p>
    </div>
    
    <div class="portfolio-card">
      <div>Portfolio Value</div>
      <div class="portfolio-value" id="portfolioValue">$0</div>
      <div>Total Return: <span id="totalReturn">+$0</span></div>
    </div>
    
    <div class="investment-types">
      <div class="inv-card" onclick="showInvForm('Stocks')"><i class="fas fa-chart-line"></i><span>Stocks</span></div>
      <div class="inv-card" onclick="showInvForm('Bonds')"><i class="fas fa-chart-simple"></i><span>Bonds</span></div>
      <div class="inv-card" onclick="showInvForm('ETF')"><i class="fas fa-chart-pie"></i><span>ETFs</span></div>
      <div class="inv-card" onclick="showInvForm('Real Estate')"><i class="fas fa-building"></i><span>Real Estate</span></div>
    </div>
    
    <div id="invFormContainer" class="inv-form">
      <h3 id="invTypeTitle"></h3>
      <input type="text" id="invName" placeholder="Investment Name" class="form-input">
      <input type="number" id="invAmount" placeholder="Amount to Invest" class="form-input">
      <button onclick="makeInvestment()" class="btn-primary">Invest Now</button>
    </div>
    
    <div class="my-investments"><h3>My Investments</h3><div id="myInvestmentsList"><div class="empty-state" style="text-align:center;padding:40px;"><i class="fas fa-chart-line"></i><p>No investments yet</p></div></div></div>
    
    <div class="bottom-nav">
      <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="cards.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Cards</span></a>
      <a href="#" class="nav-item"><i class="fas fa-exchange-alt"></i><span>Transfer</span></a>
      <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>
  </div>
  
  <div id="bbcModal" class="modal">
    <div class="modal-content">
      <div id="invStep1"><i class="fas fa-shield-alt"></i><h3>BBC Code #1</h3><input type="text" id="bbc1" placeholder="Enter Code"><button onclick="verifyInvBbc1()">Verify</button></div>
      <div id="invStep2" style="display:none"><i class="fas fa-shield-alt"></i><h3>BBC Code #2</h3><input type="text" id="bbc2" placeholder="Enter Code"><button onclick="verifyInvBbc2()">Verify</button></div>
      <div id="invStep3" style="display:none"><i class="fas fa-shield-alt"></i><h3>BBC Code #3</h3><input type="text" id="bbc3" placeholder="Enter Code"><button onclick="completeInvestment()">Complete</button></div>
    </div>
  </div>
  <div id="loadingModal" class="modal"><div class="modal-content"><div class="spinner"></div><p>Processing...</p></div></div>
  
  <script>
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    let currentUser = null, token = null, pendingInvestment = null, invPin = null;
    const BBC = { INV_P: 'PRI-9517-GH', INV_S: 'SEC-2846-IJ', INV_F: 'FIN-7392-KL' };
    
    async function loadUser() {
      const stored = sessionStorage.getItem('currentUser');
      const storedToken = sessionStorage.getItem('token');
      if (!stored || !storedToken) { window.location.href = 'login.html'; return; }
      currentUser = JSON.parse(stored);
      token = storedToken;
      await fetchUserData();
      updatePortfolio();
      loadInvestments();
    }
    async function fetchUserData() {
      try {
        const res = await fetch(`${API_URL}/user/${currentUser.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        currentUser = { ...currentUser, ...data };
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
      } catch(e) {}
    }
    function updatePortfolio() {
      let total = currentUser.investments?.reduce((s, i) => s + i.value, 0) || 0;
      document.getElementById('portfolioValue').innerHTML = `${currentUser.currencySymbol}${total.toLocaleString()}`;
      document.getElementById('totalReturn').innerHTML = `+${currentUser.currencySymbol}${total.toLocaleString()}`;
    }
    function loadInvestments() {
      const container = document.getElementById('myInvestmentsList');
      if (!currentUser.investments || currentUser.investments.length === 0) {
        container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;"><i class="fas fa-chart-line"></i><p>No investments yet</p></div>';
        return;
      }
      container.innerHTML = currentUser.investments.map(i => `<div class="investment-item"><div><strong>${i.name}</strong><br><small>${i.type}</small></div><div><strong>${currentUser.currencySymbol}${i.amount.toLocaleString()}</strong><br><small>${new Date(i.purchasedAt).toLocaleDateString()}</small></div></div>`).join('');
    }
    function showInvForm(type) { pendingInvestment = { type }; document.getElementById('invTypeTitle').innerHTML = `<i class="fas fa-${type === 'Stocks' ? 'chart-line' : type === 'Bonds' ? 'chart-simple' : type === 'ETF' ? 'chart-pie' : 'building'}"></i> ${type} Investment`; document.getElementById('invFormContainer').classList.add('active'); }
    function makeInvestment() {
      const name = document.getElementById('invName').value;
      const amount = parseFloat(document.getElementById('invAmount').value);
      if (!name || !amount || amount <= 0) { alert('Enter name and amount'); return; }
      if (amount > currentUser.balance) { alert('Insufficient balance'); return; }
      pendingInvestment = { ...pendingInvestment, name, amount };
      document.getElementById('bbcModal').classList.add('active');
      document.getElementById('invStep1').style.display = 'block';
      document.getElementById('invStep2').style.display = 'none';
      document.getElementById('invStep3').style.display = 'none';
    }
    function verifyInvBbc1() { const bbc = document.getElementById('bbc1').value; if (bbc !== BBC.INV_P) { alert('Invalid Code'); return; } document.getElementById('invStep1').style.display = 'none'; document.getElementById('invStep2').style.display = 'block'; }
    function verifyInvBbc2() { const bbc = document.getElementById('bbc2').value; if (bbc !== BBC.INV_S) { alert('Invalid Code'); return; } document.getElementById('invStep2').style.display = 'none'; document.getElementById('invStep3').style.display = 'block'; }
    async function completeInvestment() { const bbc3 = document.getElementById('bbc3').value; if (bbc3 !== BBC.INV_F) { alert('Invalid Code'); return; } document.getElementById('bbcModal').classList.remove('active'); document.getElementById('loadingModal').classList.add('active'); try { const res = await fetch(`${API_URL}/user/${currentUser.id}/invest`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ investmentType: pendingInvestment.type, amount: pendingInvestment.amount, name: pendingInvestment.name }) }); if (res.ok) { alert(`✅ Invested ${currentUser.currencySymbol}${pendingInvestment.amount} in ${pendingInvestment.name}`); location.reload(); } else { alert('Failed'); } } catch(e) { alert('Error'); } document.getElementById('loadingModal').classList.remove('active'); }
    loadUser();
    window.showInvForm = showInvForm; window.makeInvestment = makeInvestment; window.verifyInvBbc1 = verifyInvBbc1; window.verifyInvBbc2 = verifyInvBbc2; window.completeInvestment = completeInvestment;
  </script>
</body>
</html>
