<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Crypto | Prime Heritage Trust</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F7FB; color: #1A2C3E; }
    .app-container { max-width: 500px; margin: 0 auto; background: #FFFFFF; min-height: 100vh; padding-bottom: 80px; }
    .page-header { background: #0A2540; padding: 30px 20px; color: white; border-radius: 0 0 32px 32px; }
    .page-header a { color: white; font-size: 24px; text-decoration: none; }
    .crypto-list { padding: 20px; }
    .crypto-item { background: #F8FAFE; border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #E2E8F0; }
    .crypto-item:hover { background: #F5A62310; transform: translateX(5px); }
    .crypto-form { padding: 20px; display: none; }
    .crypto-form.active { display: block; }
    .my-crypto { padding: 20px; }
    .btn-primary { background: #F5A623; color: #0A2540; padding: 14px; border: none; border-radius: 40px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 16px; }
    .form-input { width: 100%; padding: 14px; border: 1px solid #E2E8F0; border-radius: 16px; margin-bottom: 12px; }
    .bottom-nav { position: fixed; bottom: 0; max-width: 500px; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 20px 24px; border-top: 1px solid #E9EDF2; }
    .nav-item { text-align: center; color: #9AA9B9; text-decoration: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #F5A623; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
    .modal.active { opacity: 1; visibility: visible; }
    .modal-content { background: white; border-radius: 32px; padding: 32px; width: 90%; max-width: 380px; text-align: center; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
      <h2>Crypto Trading</h2>
      <p>Buy & sell cryptocurrency</p>
    </div>
    
    <div class="crypto-list">
      <div class="crypto-item" onclick="showCryptoForm('Bitcoin', 45000)"><div><i class="fab fa-bitcoin"></i> Bitcoin<br><small>BTC</small></div><div><strong>$45,000</strong><br><span style="color:#10B981;">+2.5%</span></div></div>
      <div class="crypto-item" onclick="showCryptoForm('Ethereum', 2800)"><div><i class="fab fa-ethereum"></i> Ethereum<br><small>ETH</small></div><div><strong>$2,800</strong><br><span style="color:#10B981;">+1.8%</span></div></div>
      <div class="crypto-item" onclick="showCryptoForm('Solana', 150)"><div><i class="fas fa-bolt"></i> Solana<br><small>SOL</small></div><div><strong>$150</strong><br><span style="color:#10B981;">+5.2%</span></div></div>
      <div class="crypto-item" onclick="showCryptoForm('Cardano', 0.45)"><div><i class="fas fa-chart-line"></i> Cardano<br><small>ADA</small></div><div><strong>$0.45</strong><br><span style="color:#EF4444;">-1.2%</span></div></div>
    </div>
    
    <div id="cryptoFormContainer" class="crypto-form">
      <h3 id="cryptoName"></h3>
      <p id="cryptoPrice"></p>
      <input type="number" id="cryptoAmount" placeholder="Amount to Buy" class="form-input">
      <div id="cryptoTotal" style="margin:16px 0; padding:12px; background:#F8FAFE; border-radius:16px;">Total: $0</div>
      <button onclick="buyCrypto()" class="btn-primary">Buy Now</button>
    </div>
    
    <div class="my-crypto"><h3>My Crypto Holdings</h3><div id="myCryptoList"><div class="empty-state" style="text-align:center;padding:40px;"><i class="fab fa-bitcoin"></i><p>No crypto holdings</p></div></div></div>
    
    <div class="bottom-nav">
      <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="cards.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Cards</span></a>
      <a href="#" class="nav-item"><i class="fas fa-exchange-alt"></i><span>Transfer</span></a>
      <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>
  </div>
  
  <div id="bbcModal" class="modal"><div class="modal-content"><div id="cStep1"><i class="fas fa-shield-alt"></i><h3>BBC Code #1</h3><input type="text" id="cBbc1"><button onclick="verifyCBbc1()">Verify</button></div><div id="cStep2" style="display:none"><i class="fas fa-shield-alt"></i><h3>BBC Code #2</h3><input type="text" id="cBbc2"><button onclick="verifyCBbc2()">Verify</button></div><div id="cStep3" style="display:none"><i class="fas fa-shield-alt"></i><h3>BBC Code #3</h3><input type="text" id="cBbc3"><button onclick="completeCryptoBuy()">Complete</button></div></div></div>
  <div id="loadingModal" class="modal"><div class="modal-content"><div class="spinner"></div><p>Processing...</p></div></div>
  
  <script>
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    let currentUser = null, token = null, selectedCrypto = null;
    const BBC = { INV_P: 'PRI-9517-GH', INV_S: 'SEC-2846-IJ', INV_F: 'FIN-7392-KL' };
    async function loadUser() { const stored = sessionStorage.getItem('currentUser'); const storedToken = sessionStorage.getItem('token'); if (!stored || !storedToken) { window.location.href = 'login.html'; return; } currentUser = JSON.parse(stored); token = storedToken; await fetchUserData(); loadCrypto(); }
    async function fetchUserData() { try { const res = await fetch(`${API_URL}/user/${currentUser.id}`, { headers: { 'Authorization': `Bearer ${token}` } }); const data = await res.json(); currentUser = { ...currentUser, ...data }; sessionStorage.setItem('currentUser', JSON.stringify(currentUser)); } catch(e) {} }
    function loadCrypto() { const container = document.getElementById('myCryptoList'); if (!currentUser.crypto || currentUser.crypto.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fab fa-bitcoin"></i><p>No crypto holdings</p></div>'; return; } container.innerHTML = currentUser.crypto.map(c => `<div class="crypto-item"><div><strong>${c.coin}</strong><br><small>${c.amount} ${c.symbol}</small></div><div><strong>${currentUser.currencySymbol}${c.value.toLocaleString()}</strong></div></div>`).join(''); }
    function showCryptoForm(coin, price) { selectedCrypto = { coin, price }; document.getElementById('cryptoName').innerHTML = `<i class="fab fa-${coin === 'Bitcoin' ? 'bitcoin' : coin === 'Ethereum' ? 'ethereum' : 'fa-bolt'}"></i> ${coin}`; document.getElementById('cryptoPrice').innerHTML = `Price: $${price}`; document.getElementById('cryptoFormContainer').classList.add('active'); document.getElementById('cryptoAmount').oninput = () => { const a = parseFloat(document.getElementById('cryptoAmount').value) || 0; document.getElementById('cryptoTotal').innerHTML = `Total: $${(a * price).toLocaleString()}`; }; }
    function buyCrypto() { const amount = parseFloat(document.getElementById('cryptoAmount').value); if (!amount || amount <= 0) { alert('Enter amount'); return; } const total = amount * selectedCrypto.price; if (total > currentUser.balance) { alert('Insufficient balance'); return; } selectedCrypto = { ...selectedCrypto, amount, total }; document.getElementById('bbcModal').classList.add('active'); document.getElementById('cStep1').style.display = 'block'; document.getElementById('cStep2').style.display = 'none'; document.getElementById('cStep3').style.display = 'none'; }
    function verifyCBbc1() { const bbc = document.getElementById('cBbc1').value; if (bbc !== BBC.INV_P) { alert('Invalid'); return; } document.getElementById('cStep1').style.display = 'none'; document.getElementById('cStep2').style.display = 'block'; }
    function verifyCBbc2() { const bbc = document.getElementById('cBbc2').value; if (bbc !== BBC.INV_S) { alert('Invalid'); return; } document.getElementById('cStep2').style.display = 'none'; document.getElementById('cStep3').style.display = 'block'; }
    async function completeCryptoBuy() { const bbc3 = document.getElementById('cBbc3').value; if (bbc3 !== BBC.INV_F) { alert('Invalid'); return; } document.getElementById('bbcModal').classList.remove('active'); document.getElementById('loadingModal').classList.add('active'); try { const res = await fetch(`${API_URL}/user/${currentUser.id}/buy-crypto`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ coin: selectedCrypto.coin, amount: selectedCrypto.amount, price: selectedCrypto.price }) }); if (res.ok) { alert(`✅ Bought ${selectedCrypto.amount} ${selectedCrypto.coin}`); location.reload(); } else { alert('Failed'); } } catch(e) { alert('Error'); } document.getElementById('loadingModal').classList.remove('active'); }
    loadUser();
    window.showCryptoForm = showCryptoForm; window.buyCrypto = buyCrypto; window.verifyCBbc1 = verifyCBbc1; window.verifyCBbc2 = verifyCBbc2; window.completeCryptoBuy = completeCryptoBuy;
  </script>
</body>
</html>
