<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign In | Prime Heritage Trust</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0A2540 0%, #1F4A6E 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: white; border-radius: 48px; padding: 48px; width: 100%; max-width: 480px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header i { font-size: 56px; color: #F5A623; margin-bottom: 16px; }
    .auth-header h2 { font-size: 28px; color: #0A2540; }
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9AA9B9; }
    .form-group input { width: 100%; padding: 14px 16px 14px 48px; border: 1px solid #E2E8F0; border-radius: 20px; font-size: 16px; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: #F5A623; box-shadow: 0 0 0 3px rgba(245,166,35,0.1); }
    .btn-auth { width: 100%; padding: 14px; background: #F5A623; color: #0A2540; border: none; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-auth:hover { background: #FFB84D; transform: translateY(-2px); }
    .auth-footer { text-align: center; margin-top: 20px; }
    .auth-footer a { color: #F5A623; text-decoration: none; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0A2540; color: white; padding: 12px 24px; border-radius: 40px; z-index: 1000; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header"><i class="fas fa-crown"></i><h2>Prime Heritage Trust</h2><p style="color: #6B7A8A;">Sign in to your account</p></div>
    <form onsubmit="event.preventDefault(); login();">
      <div class="form-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email Address" required></div>
      <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="loginPin" placeholder="Transaction PIN" maxlength="6" required></div>
      <button type="submit" class="btn-auth">Sign In</button>
    </form>
    <div class="auth-footer"><p>Don't have an account? <a href="signup.html">Create Account</a></p><p><a href="#">Forgot PIN?</a></p></div>
  </div>
  <script>
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    function showToast(msg) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    async function login() { const email = document.getElementById('loginEmail').value; const pin = document.getElementById('loginPin').value; if (!email || !pin) { showToast('Enter email and PIN'); return; } try { const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, pin }) }); const data = await res.json(); if (res.ok) { sessionStorage.setItem('token', data.token); sessionStorage.setItem('currentUser', JSON.stringify(data.user)); window.location.href = data.user.isAdmin ? 'admin.html' : 'dashboard.html'; } else { showToast(data.error); } } catch(e) { showToast('Login failed'); } }
  </script>
</body>
</html>
