<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Settings | Prime Heritage Trust</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F7FB; color: #1A2C3E; }
    .app-container { max-width: 500px; margin: 0 auto; background: #FFFFFF; min-height: 100vh; padding-bottom: 80px; }
    .page-header { background: #0A2540; padding: 30px 20px; color: white; border-radius: 0 0 32px 32px; }
    .page-header a { color: white; font-size: 24px; text-decoration: none; }
    .settings-section { padding: 20px; }
    .settings-group { margin-bottom: 24px; }
    .settings-group h3 { margin-bottom: 16px; font-size: 18px; }
    .settings-item { background: #F8FAFE; border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #E2E8F0; transition: 0.2s; }
    .settings-item:hover { background: #F5A62310; transform: translateX(5px); }
    .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: 0.4s; border-radius: 50%; }
    input:checked + .slider { background-color: #F5A623; }
    input:checked + .slider:before { transform: translateX(26px); }
    .btn-primary { background: #F5A623; color: #0A2540; padding: 14px; border: none; border-radius: 40px; font-weight: 600; width: 100%; cursor: pointer; }
    .form-input { width: 100%; padding: 14px; border: 1px solid #E2E8F0; border-radius: 16px; margin-bottom: 12px; font-family: inherit; }
    .bottom-nav { position: fixed; bottom: 0; max-width: 500px; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 20px 24px; border-top: 1px solid #E9EDF2; }
    .nav-item { text-align: center; color: #9AA9B9; text-decoration: none; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
    .modal.active { opacity: 1; visibility: visible; }
    .modal-content { background: white; border-radius: 32px; padding: 32px; width: 90%; max-width: 380px; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #F5A623; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1A2C3E; color: white; padding: 12px 24px; border-radius: 40px; z-index: 1100; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
      <h2>Settings</h2>
      <p>Customize your experience</p>
    </div>
    
    <div class="settings-section">
      <div class="settings-group"><h3><i class="fas fa-palette"></i> Appearance</h3>
        <div class="settings-item"><span><i class="fas fa-moon"></i> Dark Mode</span><label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label></div>
      </div>
      <div class="settings-group"><h3><i class="fas fa-lock"></i> Security</h3>
        <div class="settings-item" onclick="openPinModal()"><span><i class="fas fa-key"></i> Change Transaction PIN</span><i class="fas fa-chevron-right"></i></div>
      </div>
      <div class="settings-group"><h3><i class="fas fa-bell"></i> Notifications</h3>
        <div class="settings-item"><span><i class="fas fa-envelope"></i> Email Alerts</span><label class="switch"><input type="checkbox" id="emailToggle" checked><span class="slider"></span></label></div>
      </div>
      <div class="settings-group"><h3><i class="fas fa-database"></i> Data</h3>
        <div class="settings-item" onclick="exportData()"><span><i class="fas fa-download"></i> Export Account Data</span><i class="fas fa-chevron-right"></i></div>
        <div class="settings-item" onclick="confirmLogout()"><span><i class="fas fa-sign-out-alt"></i> Logout</span><i class="fas fa-chevron-right"></i></div>
      </div>
    </div>
    
    <div class="bottom-nav">
      <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="cards.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Cards</span></a>
      <a href="#" class="nav-item"><i class="fas fa-exchange-alt"></i><span>Transfer</span></a>
      <a href="settings.html" class="nav-item active"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>
  </div>
  
  <div id="pinModal" class="modal"><div class="modal-content"><i class="fas fa-lock"></i><h3>Change PIN</h3><input type="password" id="currentPin" placeholder="Current PIN"><input type="password" id="newPin" placeholder="New PIN (4-6 digits)"><input type="password" id="confirmPin" placeholder="Confirm PIN"><button onclick="changePin()" class="btn-primary">Update PIN</button><button onclick="closeModal('pinModal')">Cancel</button></div></div>
  <div id="loadingModal" class="modal"><div class="modal-content"><div class="spinner"></div><p>Updating...</p></div></div>
  
  <script>
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    let currentUser = null, token = null;
    function showToast(msg) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    async function loadUser() {
      const stored = sessionStorage.getItem('currentUser');
      const storedToken = sessionStorage.getItem('token');
      if (!stored || !storedToken) { window.location.href = 'login.html'; return; }
      currentUser = JSON.parse(stored);
      token = storedToken;
      await fetchUserData();
      applySettings();
    }
    async function fetchUserData() {
      try {
        const res = await fetch(`${API_URL}/user/${currentUser.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        currentUser = { ...currentUser, ...data };
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
      } catch(e) {}
    }
    function applySettings() { document.getElementById('themeToggle').checked = currentUser.theme === 'dark'; if (currentUser.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); }
    async function toggleTheme() {
      const newTheme = document.getElementById('themeToggle').checked ? 'dark' : 'light';
      document.getElementById('loadingModal').classList.add('active');
      try {
        const res = await fetch(`${API_URL}/user/${currentUser.id}/theme`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ theme: newTheme }) });
        if (res.ok) { currentUser.theme = newTheme; if (newTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); else document.documentElement.removeAttribute('data-theme'); showToast('Theme updated'); }
      } catch(e) {}
      document.getElementById('loadingModal').classList.remove('active');
    }
    function openPinModal() { document.getElementById('pinModal').classList.add('active'); }
    async function changePin() {
      const currentPin = document.getElementById('currentPin').value;
      const newPin = document.getElementById('newPin').value;
      const confirmPin = document.getElementById('confirmPin').value;
      if (!currentPin || !newPin) { alert('Fill all fields'); return; }
      if (newPin !== confirmPin) { alert('PINs do not match'); return; }
      if (newPin.length < 4 || newPin.length > 6) { alert('PIN must be 4-6 digits'); return; }
      document.getElementById('loadingModal').classList.add('active');
      try {
        const res = await fetch(`${API_URL}/user/${currentUser.id}/change-pin`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ currentPin, newPin }) });
        const data = await res.json();
        if (res.ok) { alert('PIN changed!'); closeModal('pinModal'); } else { alert(data.error); }
      } catch(e) { alert('Failed'); }
      document.getElementById('loadingModal').classList.remove('active');
    }
    function exportData() { alert('Your account data will be emailed to you shortly.'); }
    function confirmLogout() { if (confirm('Logout?')) { sessionStorage.clear(); window.location.href = 'login.html'; } }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    document.getElementById('themeToggle')?.addEventListener('change', toggleTheme);
    loadUser();
    window.openPinModal = openPinModal; window.changePin = changePin; window.exportData = exportData; window.confirmLogout = confirmLogout; window.closeModal = closeModal;
  </script>
</body>
</html>
